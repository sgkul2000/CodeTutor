# Judge0 configuration
# Disable authentication for local development
AUTHN_HEADER=
AUTHN_TOKEN=

# Resource limits
CPU_TIME_LIMIT=5
MEMORY_LIMIT=256000

# Disable cgroup-based resource enforcement for macOS ARM64 + Podman.
#
# Fedora CoreOS 42 (Podman Machine VM) uses cgroup v2 exclusively.
# Judge0 1.13.1 / isolate 1.8.1 requires cgroup v1 memory hierarchy,
# which is unavailable. The workaround is to enable "per-process and
# per-thread" limits, which makes isolate use setrlimit() instead of
# cgroup-based enforcement (no --cg flag is passed to isolate).
#
# DISABLE_CGROUP_USAGE is a no-op in this version — the actual flags
# that control --cg are the two below.
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=true
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=true

# Disable network access inside sandboxes
ENABLE_NETWORK=false

# Workers
COUNT_OF_WORKERS=2
