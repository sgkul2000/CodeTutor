# Judge0 services only.
# MongoDB is managed separately via Homebrew (brew services start mongodb-community).
# Run with: podman compose -f judge0-compose.yml up -d

services:
  # Judge0 internal Postgres (stores submissions/results)
  judge0-db:
    image: postgres:15-alpine
    container_name: judge0-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0pass
    volumes:
      - judge0_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Judge0 internal Redis (job queue between server and workers)
  judge0-redis:
    image: redis:7.2-alpine
    container_name: judge0-redis
    restart: unless-stopped
    volumes:
      - judge0_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Judge0 API server — exposed on host port 2358
  judge0-server:
    image: judge0/judge0:1.13.1
    container_name: judge0-server
    restart: unless-stopped
    ports:
      - "2358:2358"
    privileged: true
    security_opt:
      - seccomp=unconfined   # Required: Podman 5.x doesn't auto-disable seccomp for privileged containers
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    environment:
      REDIS_HOST: judge0-redis
      REDIS_PORT: 6379
      POSTGRES_HOST: judge0-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0pass
    volumes:
      - ./judge0.conf:/judge0.conf:ro

  # Judge0 workers — execute submitted code in sandboxes
  judge0-workers:
    image: judge0/judge0:1.13.1
    container_name: judge0-workers
    restart: unless-stopped
    command: ["./scripts/workers"]
    privileged: true
    security_opt:
      - seccomp=unconfined   # Required: allows isolate to create Linux namespaces for sandboxing
    depends_on:
      judge0-server:
        condition: service_started
    environment:
      REDIS_HOST: judge0-redis
      REDIS_PORT: 6379
      POSTGRES_HOST: judge0-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0pass
    volumes:
      - ./judge0.conf:/judge0.conf:ro

volumes:
  judge0_db_data:
  judge0_redis_data:
